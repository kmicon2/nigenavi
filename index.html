<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#F5FAFF">

    <title>Nige Navi</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <main class="container">

        <!-- =========================
             Header
        ========================== -->
        <header class="header">

            <div class="logo-area">

                <div class="logo" aria-hidden="true">
                    🌊🏃
                </div>

                <div class="title-area">
                    <h1>Nige Navi</h1>
                    <p class="subtitle">
                        津波避難支援アプリ
                    </p>
                </div>

            </div>

        </header>

        <!-- =========================
             Notice
        ========================== -->
        <section class="notice-card">

            <p class="notice-text">
                このアプリは避難支援を目的とした参考情報です。安全を保証するものではありません。
            </p>

        </section>

        <!-- =========================
             Current Location
        ========================== -->
        <section class="card">

            <h2 class="card-title">
                現在地情報
            </h2>

            <div id="locationCard">

                <p id="locationStatus">
                    位置情報取得中...
                </p>

                <div id="locationDetail" class="hidden">

                    <div class="info-row">
                        <span class="label">市区町村</span>
                        <span id="cityName">---</span>
                    </div>

                    <div class="info-row">
                        <span class="label">緯度</span>
                        <span id="latitude">---</span>
                    </div>

                    <div class="info-row">
                        <span class="label">経度</span>
                        <span id="longitude">---</span>
                    </div>

                </div>

            </div>

        </section>

        <!-- =========================
             Transport
        ========================== -->
        <section class="card">

            <h2 class="card-title">
                移動手段
            </h2>

            <div class="transport-grid">

                <button
                    id="walkButton"
                    class="transport-button"
                    data-mode="walk"
                    type="button">

                    <span class="transport-icon">🚶</span>
                    <span class="transport-label">徒歩</span>

                </button>

                <button
                    id="bikeButton"
                    class="transport-button"
                    data-mode="bike"
                    type="button">

                    <span class="transport-icon">🚲</span>
                    <span class="transport-label">自転車</span>

                </button>

                <button
                    id="carButton"
                    class="transport-button"
                    data-mode="car"
                    type="button">

                    <span class="transport-icon">🚗</span>
                    <span class="transport-label">車</span>

                </button>

            </div>

        </section>

        <!-- =========================
             Search
        ========================== -->
        <section>

            <button
                id="searchButton"
                class="primary-button"
                type="button">

                避難先を検索

            </button>

        </section>

        <!-- =========================
             Search Result
        ========================== -->
        <section
            id="resultArea"
            class="result-area">

            <!-- メッセージ表示 -->
            <div
                id="resultMessage"
                class="hidden">
            </div>

            <!-- 候補カード表示 -->
            <div
                id="resultList">
            </div>

        </section>

        <!-- =========================
             Guide
        ========================== -->
        <section>

            <button
                id="guideButton"
                class="secondary-button"
                type="button"
                disabled>

                案内開始

            </button>

        </section>

    </main>

    <script type="module" src="js/app.js"></script>

</body>

</html>
